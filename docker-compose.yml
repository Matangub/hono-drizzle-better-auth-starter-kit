services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hono_drizzle_better_auth_test
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      interval: 5s
      retries: 20
      test: ["CMD-SHELL", "pg_isready -U postgres -d hono_drizzle_better_auth_test"]
      timeout: 5s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: